name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            asset: babi-linux-amd64

          - name: linux-arm64
            goos: linux
            goarch: arm64
            asset: babi-linux-arm64

          - name: macos-amd64
            goos: darwin
            goarch: amd64
            asset: babi-macos-amd64

          - name: macos-arm64
            goos: darwin
            goarch: arm64
            asset: babi-macos-arm64

          - name: windows-amd64
            goos: windows
            goarch: amd64
            asset: babi-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ${{ matrix.asset }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > checksums.txt && cat checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
