<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>babi CI</title>
<style>
:root {
  --bg: #0d1117;
  --sidebar: #161b22;
  --card: #21262d;
  --border: #30363d;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --danger: #f85149;
  --warn: #d29922;
  --text: #c9d1d9;
  --dim: #8b949e;
  --running: #d29922;
  --success: #3fb950;
  --failed: #f85149;
  --pending: #8b949e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

/* Layout */
.layout { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 260px; min-width: 220px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.detail-area { flex: 1; display: flex; overflow: hidden; }
.project-panel { flex: 1; overflow-y: auto; padding: 20px; }
.log-panel { width: 480px; min-width: 320px; border-left: 1px solid var(--border); display: flex; flex-direction: column; background: var(--sidebar); }

/* Header */
.topbar { height: 48px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; }
.topbar h1 { font-size: 16px; font-weight: 600; color: var(--accent); letter-spacing: 0.5px; }
.topbar .version { color: var(--dim); font-size: 12px; }

/* Sidebar sections */
.sidebar-section { padding: 0; }
.sidebar-section-header { padding: 12px 16px 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--dim); display: flex; align-items: center; justify-content: space-between; }
.sidebar-item { padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; border-left: 2px solid transparent; transition: background 0.1s; color: var(--text); }
.sidebar-item:hover { background: rgba(255,255,255,0.05); }
.sidebar-item.active { background: rgba(88,166,255,0.1); border-left-color: var(--accent); color: var(--accent); }
.sidebar-item .item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
.sidebar-divider { height: 1px; background: var(--border); margin: 4px 0; }
.sidebar-scroll { flex: 1; overflow-y: auto; }

/* Runner dots */
.runner-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.runner-dot.online { background: var(--success); }
.runner-dot.offline { background: var(--dim); }
.runner-info { font-size: 11px; color: var(--dim); }

/* Buttons */
button { cursor: pointer; border: none; border-radius: 6px; font-size: 13px; font-family: inherit; transition: opacity 0.15s; }
button:hover { opacity: 0.85; }
button:active { opacity: 0.7; }
.btn-primary { background: var(--accent); color: #0d1117; padding: 7px 16px; font-weight: 600; }
.btn-danger { background: var(--danger); color: #fff; padding: 7px 16px; }
.btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--border); padding: 6px 12px; }
.btn-icon { background: transparent; color: var(--dim); padding: 4px 8px; font-size: 16px; line-height: 1; }
.btn-icon:hover { color: var(--text); opacity: 1; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-run { background: var(--accent2); color: #0d1117; padding: 8px 20px; font-size: 14px; font-weight: 600; }

/* Cards */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Forms */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 5px; font-weight: 500; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none;
  transition: border-color 0.15s;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 80px; font-family: 'Courier New', monospace; font-size: 12px; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }

/* Project header */
.project-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
.project-header-info { flex: 1; }
.project-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.project-url { color: var(--dim); font-size: 13px; font-family: monospace; word-break: break-all; }
.project-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* Build list */
.build-list { display: flex; flex-direction: column; gap: 6px; }
.build-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: border-color 0.15s; }
.build-item:hover { border-color: var(--accent); }
.build-item.selected { border-color: var(--accent); background: rgba(88,166,255,0.05); }
.build-status { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
.build-status.running { background: rgba(210,153,34,0.2); color: var(--running); }
.build-status.success { background: rgba(63,185,80,0.2); color: var(--success); }
.build-status.failed { background: rgba(248,81,73,0.2); color: var(--failed); }
.build-status.pending { background: rgba(139,148,158,0.2); color: var(--pending); }
.build-meta { flex: 1; font-size: 12px; color: var(--dim); }
.build-id { font-family: monospace; font-size: 12px; color: var(--accent); }
.build-runner { font-size: 12px; color: var(--dim); margin-left: auto; }

/* Log panel */
.log-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.log-header-title { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.log-body { flex: 1; overflow-y: auto; padding: 12px 16px; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.6; background: #010409; }
.log-line { color: #c9d1d9; white-space: pre-wrap; word-break: break-all; }
.log-line.err { color: #f85149; }
.log-line.info { color: #58a6ff; }
.log-line.done { color: #3fb950; font-weight: bold; }
.log-empty { color: var(--dim); font-style: italic; padding: 20px; text-align: center; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 10px; width: 600px; max-width: 95vw; max-height: 90vh; overflow-y: auto; padding: 24px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.hidden { display: none !important; }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.tab { padding: 8px 16px; cursor: pointer; color: var(--dim); font-size: 13px; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Alerts */
.alert { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
.alert-warn { background: rgba(210,153,34,0.15); border: 1px solid rgba(210,153,34,0.3); color: var(--warn); }
.alert-success { background: rgba(63,185,80,0.15); border: 1px solid rgba(63,185,80,0.3); color: var(--success); }
.alert-info { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.2); color: var(--accent); }

/* Empty states */
.empty-state { text-align: center; padding: 60px 20px; color: var(--dim); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* Misc */
.tag { background: rgba(88,166,255,0.15); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-family: monospace; }
.tag.docker { background: rgba(63,185,80,0.15); color: var(--success); }
.flex { display: flex; }
.gap-8 { gap: 8px; }
.gap-4 { gap: 4px; }
.flex-wrap { flex-wrap: wrap; }
.runner-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.artifact-link { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); text-decoration: none; font-size: 13px; }
.artifact-link:hover { text-decoration: underline; }
.artifacts-list { display: flex; flex-direction: column; gap: 6px; }
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="topbar" style="border-right:0">
      <h1>babi CI</h1>
    </div>
    <div class="sidebar-scroll">
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          Projects
          <button class="btn-icon" onclick="showNewProjectModal()" title="New project">+</button>
        </div>
        <div id="project-list"></div>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">
        <div class="sidebar-section-header">Runners</div>
        <div id="runner-list"></div>
      </div>
    </div>
  </div>

  <!-- Main area -->
  <div class="main">
    <div class="detail-area">
      <!-- Project / build detail -->
      <div class="project-panel" id="main-content">
        <div class="empty-state">
          <div class="icon">⚙️</div>
          <p>Select a project or create a new one</p>
        </div>
      </div>

      <!-- Log panel -->
      <div class="log-panel" id="log-panel">
        <div class="log-header">
          <span class="log-header-title" id="log-title">No build selected</span>
          <button class="btn-icon" onclick="closeLogPanel()" title="Close">✕</button>
        </div>
        <div class="log-body" id="log-body">
          <div class="log-empty">Select a build to view logs</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- New / Edit Project Modal -->
<div class="modal-overlay hidden" id="project-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Project</div>
    <div class="tabs">
      <div class="tab active" data-tab="basic" onclick="switchTab(this)">Basic</div>
      <div class="tab" data-tab="params" onclick="switchTab(this)">Params</div>
      <div class="tab" data-tab="runners" onclick="switchTab(this)">Runners</div>
    </div>
    <div id="tab-basic">
      <div class="form-group">
        <label>Project Name *</label>
        <input type="text" id="f-name" placeholder="my-project">
      </div>
      <div class="form-group">
        <label>Git URL *</label>
        <input type="text" id="f-git-url" placeholder="http://gitserver/repo.git">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Git Username</label>
          <input type="text" id="f-git-user" placeholder="user">
        </div>
        <div class="form-group">
          <label>Git Password</label>
          <input type="password" id="f-git-pass" placeholder="••••••••">
        </div>
      </div>
      <div class="form-group">
        <label>Artifact Glob</label>
        <input type="text" id="f-glob" placeholder="output/*-hello.zip">
      </div>
    </div>
    <div id="tab-params" class="hidden">
      <div class="form-group">
        <label>Common Params (JSON)</label>
        <textarea id="f-params" placeholder='{"docker_image": "gcc:latest"}'>{}</textarea>
      </div>
      <div class="form-group">
        <label>Per-Runner Params (JSON)</label>
        <textarea id="f-runner-params" placeholder='{"my-runner": {"key": "value"}}'>{}</textarea>
      </div>
    </div>
    <div id="tab-runners" class="hidden">
      <div class="alert alert-info">Leave empty to dispatch to all online runners.</div>
      <div class="form-group">
        <label>Assigned Runners (comma-separated names)</label>
        <input type="text" id="f-runners" placeholder="mac-runner, win-runner">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveProject()">Save</button>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let projects = [];
let runners = [];
let builds = {};         // project_id → [build, ...]
let selectedProject = null;
let selectedBuild = null;
let logEventSource = null;
let editingProjectId = null;

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadProjects(), loadRunners()]);
  setInterval(loadRunners, 5000);
  setInterval(() => { if (selectedProject) loadBuilds(selectedProject.id); }, 5000);
}

// ─── API helpers ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  if (!r.ok) throw new Error(await r.text());
  if (r.status === 204) return null;
  return r.json();
}

// ─── Projects ─────────────────────────────────────────────────────────────────
async function loadProjects() {
  projects = await api('GET', '/projects');
  renderProjectList();
  if (selectedProject) {
    const updated = projects.find(p => p.id === selectedProject.id);
    if (updated) selectedProject = updated;
  }
}

function renderProjectList() {
  const el = document.getElementById('project-list');
  if (!projects.length) {
    el.innerHTML = '<div style="padding:8px 16px;color:var(--dim);font-size:12px;">No projects yet</div>';
    return;
  }
  el.innerHTML = projects.map(p => `
    <div class="sidebar-item ${selectedProject?.id === p.id ? 'active' : ''}" onclick="selectProject('${p.id}')">
      <span style="font-size:16px">📦</span>
      <span class="item-name">${esc(p.name)}</span>
    </div>
  `).join('');
}

async function selectProject(id) {
  selectedProject = projects.find(p => p.id === id);
  renderProjectList();
  await loadBuilds(id);
  renderProjectDetail();
}

async function loadBuilds(projectId) {
  try {
    const bs = await api('GET', `/builds?project_id=${projectId}`);
    builds[projectId] = bs || [];
    if (selectedProject?.id === projectId) renderBuildList();
  } catch (e) {}
}

function renderProjectDetail() {
  const p = selectedProject;
  if (!p) return;
  const bs = (builds[p.id] || []).slice().reverse();

  document.getElementById('main-content').innerHTML = `
    <div class="project-header">
      <div class="project-header-info">
        <div class="project-title">${esc(p.name)}</div>
        <div class="project-url">${esc(p.git_url)}</div>
      </div>
      <div class="project-actions">
        <button class="btn-run" onclick="runProject('${p.id}')">▶ Run</button>
        <button class="btn-ghost btn-sm" onclick="editProject('${p.id}')">Edit</button>
        <button class="btn-danger btn-sm" onclick="deleteProject('${p.id}')">Delete</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Configuration</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;">
        <div><span style="color:var(--dim)">Git URL: </span><code style="font-size:12px">${esc(p.git_url)}</code></div>
        <div><span style="color:var(--dim)">Artifact glob: </span><code style="font-size:12px">${esc(p.file_glob || '*')}</code></div>
        <div><span style="color:var(--dim)">Runners: </span>${p.runners?.length ? p.runners.map(r => `<span class="tag">${esc(r)}</span>`).join(' ') : '<span style="color:var(--dim)">all online</span>'}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Builds</div>
      <div id="build-list-container">
        ${renderBuildsHTML(bs)}
      </div>
    </div>
  `;
}

function renderBuildsHTML(bs) {
  if (!bs || !bs.length) return '<div style="color:var(--dim);font-size:13px;padding:8px 0;">No builds yet. Click Run to start one.</div>';
  return '<div class="build-list">' + bs.map(b => `
    <div class="build-item ${selectedBuild?.id === b.id ? 'selected' : ''}" onclick="selectBuild('${b.id}')">
      <span class="build-status ${b.status}">${b.status}</span>
      <span class="build-id">${b.id.slice(0,8)}</span>
      <span class="build-meta">${formatTime(b.started_at)}</span>
      <span class="build-runner">🖥 ${esc(b.runner_name)}</span>
    </div>
  `).join('') + '</div>';
}

function renderBuildList() {
  const container = document.getElementById('build-list-container');
  if (!container) return;
  const bs = (builds[selectedProject?.id] || []).slice().reverse();
  container.innerHTML = renderBuildsHTML(bs);
}

async function runProject(id) {
  try {
    const result = await api('POST', `/projects/${id}/run`);
    if (result.warning) showAlert(result.warning, 'warn');
    if (result.missing_runners?.length) {
      showAlert(`Offline runners skipped: ${result.missing_runners.join(', ')}`, 'warn');
    }
    if (result.builds?.length) {
      const dispatched = result.builds.filter(b => b.status === 'dispatched').length;
      showAlert(`Dispatched ${dispatched} build(s)`, 'success');
      await loadBuilds(id);
      renderBuildList();
      // Auto-open the first dispatched build's log
      const first = result.builds.find(b => b.status === 'dispatched');
      if (first) selectBuild(first.build_id);
    }
  } catch (e) {
    showAlert('Error: ' + e.message, 'warn');
  }
}

async function deleteProject(id) {
  if (!confirm('Delete this project?')) return;
  await api('DELETE', `/projects/${id}`);
  if (selectedProject?.id === id) {
    selectedProject = null;
    document.getElementById('main-content').innerHTML = '<div class="empty-state"><div class="icon">⚙️</div><p>Select a project or create a new one</p></div>';
  }
  await loadProjects();
}

// ─── Builds & logs ────────────────────────────────────────────────────────────
async function selectBuild(buildId) {
  // Find build in current project
  const allBuilds = Object.values(builds).flat();
  selectedBuild = allBuilds.find(b => b.id === buildId);
  renderBuildList();
  openLogPanel(buildId);
}

function openLogPanel(buildId) {
  if (logEventSource) {
    logEventSource.close();
    logEventSource = null;
  }

  const logBody = document.getElementById('log-body');
  const logTitle = document.getElementById('log-title');
  logTitle.textContent = 'Build ' + buildId.slice(0, 8);
  logBody.innerHTML = '';

  // SSE connection
  logEventSource = new EventSource(`/api/builds/${buildId}/logs/stream`);

  logEventSource.onmessage = (e) => {
    const line = JSON.parse(e.data);
    appendLogLine(logBody, line);
  };

  logEventSource.addEventListener('done', () => {
    logEventSource.close();
    logEventSource = null;
    appendLogLine(logBody, '─── build finished ───', 'done');
    loadArtifacts(buildId);
    if (selectedProject) loadBuilds(selectedProject.id);
  });

  logEventSource.onerror = () => {
    if (logEventSource?.readyState === EventSource.CLOSED) return;
    logEventSource?.close();
  };
}

function appendLogLine(container, text, cls) {
  const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 30;
  const line = document.createElement('div');
  line.className = 'log-line' + (cls ? ' ' + cls : classifyLine(text));
  line.textContent = text;
  container.appendChild(line);
  if (wasAtBottom) container.scrollTop = container.scrollHeight;
}

function classifyLine(line) {
  if (line.includes('[stderr]') || line.toLowerCase().includes('error') || line.toLowerCase().includes('failed')) return ' err';
  if (line.startsWith('[babi-ci]') || line.startsWith('[runner]') || line.startsWith('[build]')) return ' info';
  return '';
}

async function loadArtifacts(buildId) {
  try {
    const artifacts = await api('GET', `/builds/${buildId}/artifacts`);
    if (!artifacts?.length) return;
    const logBody = document.getElementById('log-body');
    appendLogLine(logBody, '─── artifacts ───', 'done');
    artifacts.forEach(a => {
      const line = document.createElement('div');
      line.className = 'log-line info';
      line.innerHTML = `  📦 <a class="artifact-link" href="${a.url}" download>${esc(a.filename)}</a>`;
      logBody.appendChild(line);
    });
  } catch (e) {}
}

function closeLogPanel() {
  if (logEventSource) { logEventSource.close(); logEventSource = null; }
  document.getElementById('log-body').innerHTML = '<div class="log-empty">Select a build to view logs</div>';
  document.getElementById('log-title').textContent = 'No build selected';
  selectedBuild = null;
  renderBuildList();
}

// ─── Runners ──────────────────────────────────────────────────────────────────
async function loadRunners() {
  try {
    runners = await api('GET', '/runners');
    renderRunnerList();
  } catch (e) {}
}

function renderRunnerList() {
  const el = document.getElementById('runner-list');
  if (!runners?.length) {
    el.innerHTML = '<div style="padding:8px 16px;color:var(--dim);font-size:12px;">No runners connected</div>';
    return;
  }
  el.innerHTML = runners.map(r => `
    <div class="sidebar-item" style="flex-direction:column;align-items:flex-start;gap:4px;cursor:default">
      <div style="display:flex;align-items:center;gap:8px;width:100%">
        <span class="runner-dot ${r.online ? 'online' : 'offline'}"></span>
        <span class="item-name" style="font-size:12px">${esc(r.name)}</span>
      </div>
      <div class="runner-tags">
        <span class="tag">${esc(r.os)}</span>
        <span class="tag">${esc(r.cpu)}</span>
        ${r.has_docker ? '<span class="tag docker">docker</span>' : ''}
      </div>
    </div>
  `).join('');
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function showNewProjectModal() {
  editingProjectId = null;
  document.getElementById('modal-title').textContent = 'New Project';
  document.getElementById('f-name').value = '';
  document.getElementById('f-git-url').value = '';
  document.getElementById('f-git-user').value = '';
  document.getElementById('f-git-pass').value = '';
  document.getElementById('f-glob').value = 'output/*-hello.zip';
  document.getElementById('f-params').value = '{}';
  document.getElementById('f-runner-params').value = '{}';
  document.getElementById('f-runners').value = '';
  switchTabByName('basic');
  document.getElementById('project-modal').classList.remove('hidden');
}

function editProject(id) {
  const p = projects.find(p => p.id === id);
  if (!p) return;
  editingProjectId = id;
  document.getElementById('modal-title').textContent = 'Edit Project';
  document.getElementById('f-name').value = p.name || '';
  document.getElementById('f-git-url').value = p.git_url || '';
  document.getElementById('f-git-user').value = p.git_user || '';
  document.getElementById('f-git-pass').value = p.git_pass || '';
  document.getElementById('f-glob').value = p.file_glob || '';
  document.getElementById('f-params').value = JSON.stringify(p.params || {}, null, 2);
  document.getElementById('f-runner-params').value = JSON.stringify(p.runner_params || {}, null, 2);
  document.getElementById('f-runners').value = (p.runners || []).join(', ');
  switchTabByName('basic');
  document.getElementById('project-modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('project-modal').classList.add('hidden');
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const tabs = ['basic', 'params', 'runners'];
  tabs.forEach(t => document.getElementById('tab-' + t).classList.add('hidden'));
  document.getElementById('tab-' + el.dataset.tab).classList.remove('hidden');
}

function switchTabByName(name) {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === name);
  });
  ['basic', 'params', 'runners'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== name);
  });
}

async function saveProject() {
  const name = document.getElementById('f-name').value.trim();
  const gitUrl = document.getElementById('f-git-url').value.trim();
  if (!name || !gitUrl) { alert('Name and Git URL are required'); return; }

  let params = {}, runnerParams = {};
  try { params = JSON.parse(document.getElementById('f-params').value || '{}'); } catch (e) { alert('Invalid params JSON'); return; }
  try { runnerParams = JSON.parse(document.getElementById('f-runner-params').value || '{}'); } catch (e) { alert('Invalid runner params JSON'); return; }

  const runnersStr = document.getElementById('f-runners').value.trim();
  const runnersList = runnersStr ? runnersStr.split(',').map(s => s.trim()).filter(Boolean) : [];

  const payload = {
    name, git_url: gitUrl,
    git_user: document.getElementById('f-git-user').value.trim(),
    git_pass: document.getElementById('f-git-pass').value,
    file_glob: document.getElementById('f-glob').value.trim(),
    params, runner_params: runnerParams, runners: runnersList
  };

  try {
    if (editingProjectId) {
      await api('PUT', `/projects/${editingProjectId}`, payload);
    } else {
      await api('POST', '/projects', payload);
    }
    closeModal();
    await loadProjects();
    if (editingProjectId) renderProjectDetail();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// ─── Alerts ───────────────────────────────────────────────────────────────────
function showAlert(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  el.style.cssText = 'position:fixed;top:16px;right:16px;z-index:200;max-width:400px;';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString();
}

// ─── Start ────────────────────────────────────────────────────────────────────
init();
</script>
